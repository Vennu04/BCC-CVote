# Hostname below (13-206-106-36.sslip.io) is derived from this deployment's
# Elastic IP — see `terraform output app_hostname`. Only needs updating if
# the EIP is ever reallocated (it's static, so in practice this is one-time).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bcc-cvote-ingress
  namespace: voting-prod
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - 13-206-106-36.sslip.io
      secretName: bcc-cvote-tls
  rules:
    - host: 13-206-106-36.sslip.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
---
# Plain-HTTP → HTTPS redirect, so http://<host> still works for anyone who
# types it without https:// (common on mobile).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bcc-cvote-ingress-redirect
  namespace: voting-prod
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: voting-prod-https-redirect@kubernetescrd
spec:
  rules:
    - host: 13-206-106-36.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: https-redirect
  namespace: voting-prod
spec:
  redirectScheme:
    scheme: https
    permanent: true
