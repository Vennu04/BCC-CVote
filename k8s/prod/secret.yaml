# No secret material lives here — External Secrets Operator (installed by
# Terraform) syncs these straight from AWS SSM Parameter Store into a
# `bcc-cvote-secret` K8s Secret inside the cluster on the refreshInterval
# below. CI never sees or commits real values.
#
# Set the real values once, out of band:
#   aws ssm put-parameter --name /bcc-cvote/prod/mongodb-uri         --type SecureString --overwrite --value "mongodb://bccadmin:<password>@bcc-mongo.voting-prod.svc.cluster.local:27017/bcc_cvote?authSource=admin"
#   aws ssm put-parameter --name /bcc-cvote/prod/mongo-root-password --type SecureString --overwrite --value "<same password as above>"
#   aws ssm put-parameter --name /bcc-cvote/prod/jwt-secret          --type SecureString --overwrite --value "$(openssl rand -hex 32)"
#   aws ssm put-parameter --name /bcc-cvote/prod/app-secret          --type SecureString --overwrite --value "$(openssl rand -hex 32)"
#
# MONGODB_URI is what the backend app uses to connect. MONGO_ROOT_PASSWORD is
# what the self-hosted mongo-statefulset.yaml uses to bootstrap that same
# user on first init — both come from this one Secret so they can never drift.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bcc-cvote-secret
  namespace: voting-prod
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: aws-ssm
    kind: ClusterSecretStore
  target:
    name: bcc-cvote-secret
    creationPolicy: Owner
  data:
    - secretKey: MONGODB_URI
      remoteRef:
        key: /bcc-cvote/prod/mongodb-uri
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: /bcc-cvote/prod/jwt-secret
    - secretKey: SECRET_KEY
      remoteRef:
        key: /bcc-cvote/prod/app-secret
    - secretKey: MONGO_ROOT_PASSWORD
      remoteRef:
        key: /bcc-cvote/prod/mongo-root-password
