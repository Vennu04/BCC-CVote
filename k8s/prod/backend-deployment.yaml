apiVersion: apps/v1
kind: Deployment
metadata:
  name: bcc-backend
  namespace: voting-prod
  labels:
    app: bcc-cvote
    component: backend
    environment: production
spec:
  # 1 replica — t3.micro (1GB RAM) free-tier node doesn't have headroom for
  # redundant replicas alongside ArgoCD/Traefik/CoreDNS. Bump this (and node
  # size) if usage grows beyond the free tier.
  replicas: 1
  selector:
    matchLabels:
      app: bcc-cvote
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bcc-cvote
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          # Image tag updated by GitHub Actions prod-cd.yml
          image: 661474704151.dkr.ecr.ap-south-1.amazonaws.com/bcc-cvote-backend:48d6d5c7
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: bcc-cvote-config
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: bcc-cvote-secret
                  key: MONGODB_URI
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: bcc-cvote-secret
                  key: JWT_SECRET_KEY
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: bcc-cvote-secret
                  key: SECRET_KEY
            - name: OPENWEATHER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bcc-cvote-secret
                  key: OPENWEATHER_API_KEY
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
      imagePullSecrets:
        - name: ecr-pull-secret
