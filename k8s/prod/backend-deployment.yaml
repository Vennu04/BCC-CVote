apiVersion: apps/v1
kind: Deployment
metadata:
  name: bcc-backend
  namespace: voting-prod
  labels:
    app: bcc-cvote
    component: backend
    environment: production
spec:
  # 2 replicas — node is a t3.small (2GB RAM; an earlier comment here said
  # t3.micro/1GB, which was stale). RollingUpdate with maxSurge/maxUnavailable
  # below already makes routine deploys zero-downtime even at 1 replica; what
  # 2 replicas actually buys is surviving a pod-level crash/OOM/liveness
  # restart without dropping requests mid-auction. Checked real node headroom
  # before bumping this (2026-07-13): k3s itself is the dominant memory
  # consumer (~826Mi, fixed regardless of app replica count), k8s requests
  # were only 17% allocated, ~525Mi genuinely available, swap dormant (0
  # active si/so, load avg 0.13) — comfortable room for one more small pod.
  # This is still a single-node cluster, so this does NOT protect against the
  # underlying EC2 instance itself going down.
  replicas: 2
  selector:
    matchLabels:
      app: bcc-cvote
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bcc-cvote
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          # Image tag updated by GitHub Actions prod-cd.yml
          image: 661474704151.dkr.ecr.ap-south-1.amazonaws.com/bcc-cvote-backend:ccd2bae7
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: bcc-cvote-config
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: bcc-cvote-secret
                  key: MONGODB_URI
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: bcc-cvote-secret
                  key: JWT_SECRET_KEY
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: bcc-cvote-secret
                  key: SECRET_KEY
            - name: OPENWEATHER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bcc-cvote-secret
                  key: OPENWEATHER_API_KEY
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: bcc-cvote-secret
                  key: SENTRY_DSN
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
      imagePullSecrets:
        - name: ecr-pull-secret
