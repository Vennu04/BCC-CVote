apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: voting-prod
  labels:
    app: bcc-cvote
    component: frontend
spec:
  type: NodePort
  selector:
    app: bcc-cvote
    component: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
      name: http
---
# Backend exposed via NodePort for CloudFront origin
apiVersion: v1
kind: Service
metadata:
  name: backend-nodeport
  namespace: voting-prod
spec:
  type: NodePort
  selector:
    app: bcc-cvote
    component: backend
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500
      protocol: TCP
      name: http
