apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: voting-prod
  labels:
    app: bcc-cvote
    component: frontend
spec:
  # ClusterIP — reached through the Traefik Ingress (ingress.yaml), which now
  # terminates TLS on hostPort 80/443. Direct NodePort access was removed
  # since it bypassed HTTPS entirely and the security group no longer opens
  # those ports.
  type: ClusterIP
  selector:
    app: bcc-cvote
    component: frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
