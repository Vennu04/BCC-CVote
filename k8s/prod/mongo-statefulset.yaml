# Self-hosted MongoDB — single replica, sized deliberately small for the
# t3.small app node (2GB RAM total, already shared with K3s/Traefik/
# cert-manager/ESO/ArgoCD/the app itself). wiredTigerCacheSizeGB is set
# explicitly because Mongo's default auto-sizing targets 50% of *available*
# container memory, which would be far too greedy here.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bcc-mongo
  namespace: voting-prod
spec:
  serviceName: bcc-mongo
  replicas: 1
  selector:
    matchLabels:
      app: bcc-mongo
  template:
    metadata:
      labels:
        app: bcc-mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7.0
          # args, not command — command would replace the image's ENTRYPOINT
          # (docker-entrypoint.sh), which is what actually creates the root
          # user from MONGO_INITDB_ROOT_USERNAME/PASSWORD on first boot.
          args:
            - mongod
            - --wiredTigerCacheSizeGB=0.25
            - --bind_ip_all
          ports:
            - containerPort: 27017
              name: mongo
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: bccadmin
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bcc-cvote-secret
                  key: MONGO_ROOT_PASSWORD
            - name: MONGO_INITDB_DATABASE
              value: bcc_cvote
          resources:
            requests:
              cpu: 50m
              memory: 200Mi
            limits:
              cpu: 300m
              memory: 400Mi
          volumeMounts:
            - name: data
              mountPath: /data/db
          # TCP probes, not `mongosh --eval` — spinning up a full Node.js CLI
          # process on every check is expensive on this box's tight memory
          # budget and was timing out under swap pressure. A TCP check is
          # cheap and sufficient to confirm the server is accepting connections.
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 3Gi
---
apiVersion: v1
kind: Service
metadata:
  name: bcc-mongo
  namespace: voting-prod
spec:
  clusterIP: None # headless — StatefulSet gets a stable DNS name, never exposed externally
  selector:
    app: bcc-mongo
  ports:
    - port: 27017
      targetPort: 27017
