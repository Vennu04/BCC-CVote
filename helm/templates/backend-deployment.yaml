apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bcc-cvote.fullname" . }}-backend
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "bcc-cvote.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.replicaCount.backend }}
  selector:
    matchLabels:
      app: {{ include "bcc-cvote.name" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "bcc-cvote.name" . }}-backend
        {{- include "bcc-cvote.labels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
    spec:
      containers:
        - name: backend
          image: {{ include "bcc-cvote.backendImage" . }}
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - containerPort: 5000
              name: http
          env:
            {{- range $key, $val := .Values.env.backend }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.backendSecretName }}
                  key: MONGODB_URI
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.backendSecretName }}
                  key: JWT_SECRET_KEY
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.backendSecretName }}
                  key: SECRET_KEY
          resources:
            {{- toYaml .Values.resources.backend | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
