name: Prod CD

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  BACKEND_REPO: bcc-cvote-backend
  FRONTEND_REPO: bcc-cvote-frontend

jobs:
  build-and-deploy:
    name: Build, Scan & Deploy to K3s
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── AWS Auth ──────────────────────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── Image tags ────────────────────────────────────────────────────────
      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # ── Build backend ─────────────────────────────────────────────────────
      - name: Build backend image
        working-directory: backend
        run: |
          docker build \
            -t ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ steps.tag.outputs.IMAGE_TAG }} \
            -t ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:latest \
            .

      # ── Trivy scan backend ────────────────────────────────────────────────
      - name: Trivy image scan (backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ steps.tag.outputs.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      # ── Build frontend ────────────────────────────────────────────────────
      - name: Build frontend image
        working-directory: frontend
        run: |
          docker build \
            --build-arg VITE_API_URL="" \
            -t ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ steps.tag.outputs.IMAGE_TAG }} \
            -t ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:latest \
            .

      # ── Trivy scan frontend ───────────────────────────────────────────────
      - name: Trivy image scan (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ steps.tag.outputs.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      # ── Push images ───────────────────────────────────────────────────────
      - name: Push backend to ECR
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ steps.tag.outputs.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:latest

      - name: Push frontend to ECR
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ steps.tag.outputs.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:latest

      # ── Update K8s manifests (GitOps) ─────────────────────────────────────
      - name: Update image tags in manifests
        run: |
          ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          TAG=${{ steps.tag.outputs.IMAGE_TAG }}
          REGION=${{ env.AWS_REGION }}

          # Matches the image reference regardless of its *current* tag — both
          # the literal ACCOUNT_ID/IMAGE_TAG placeholders (first-ever deploy)
          # and a real numeric account ID + real tag (every deploy after),
          # so this keeps working on the 1st, 2nd, 3rd, ... deploy alike.
          sed -i -E "s|[A-Za-z0-9_]+\.dkr\.ecr\.[a-z0-9-]+\.amazonaws\.com/${{ env.BACKEND_REPO }}:[A-Za-z0-9._-]+|${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/${{ env.BACKEND_REPO }}:${TAG}|g" \
            k8s/prod/backend-deployment.yaml

          sed -i -E "s|[A-Za-z0-9_]+\.dkr\.ecr\.[a-z0-9-]+\.amazonaws\.com/${{ env.FRONTEND_REPO }}:[A-Za-z0-9._-]+|${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/${{ env.FRONTEND_REPO }}:${TAG}|g" \
            k8s/prod/frontend-deployment.yaml

      # Secrets are NOT handled here — External Secrets Operator syncs them
      # straight from SSM Parameter Store into the cluster on its own
      # refresh interval. CI never reads or commits secret material.

      # ── Commit updated manifests (ArgoCD picks up changes) ────────────────
      - name: Commit & push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/prod/backend-deployment.yaml k8s/prod/frontend-deployment.yaml
          git commit -m "chore: deploy ${{ steps.tag.outputs.IMAGE_TAG }} to prod [skip ci]"
          git push
