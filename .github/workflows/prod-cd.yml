name: Prod CD

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  BACKEND_REPO: bcc-cvote-backend
  FRONTEND_REPO: bcc-cvote-frontend
  CLOUDFRONT_URL: https://d2welg0wjdnhjp.cloudfront.net

jobs:
  build-and-push:
    name: Build, Scan & Push Images
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.tag.outputs.IMAGE_TAG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── AWS Auth ──────────────────────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── Image tags ────────────────────────────────────────────────────────
      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # ── Build backend ─────────────────────────────────────────────────────
      - name: Build backend image
        working-directory: backend
        run: |
          docker build \
            -t ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ steps.tag.outputs.IMAGE_TAG }} \
            -t ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:latest \
            .

      # ── Trivy scan backend ────────────────────────────────────────────────
      - name: Trivy image scan (backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ steps.tag.outputs.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      # ── Build frontend ────────────────────────────────────────────────────
      - name: Build frontend image
        working-directory: frontend
        run: |
          docker build \
            --build-arg VITE_API_URL="" \
            -t ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ steps.tag.outputs.IMAGE_TAG }} \
            -t ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:latest \
            .

      # ── Trivy scan frontend ───────────────────────────────────────────────
      - name: Trivy image scan (frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ steps.tag.outputs.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      # ── Push images ───────────────────────────────────────────────────────
      - name: Push backend to ECR
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ steps.tag.outputs.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:latest

      - name: Push frontend to ECR
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ steps.tag.outputs.IMAGE_TAG }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:latest

      # Secrets are NOT handled here — External Secrets Operator (or its
      # successor) syncs them straight from SSM Parameter Store into the
      # cluster on its own refresh interval. CI never reads or commits
      # secret material.

  deploy:
    name: Deploy to K3s (sequential rolling cutover)
    needs: build-and-push
    # Runs on the self-hosted runner living on the k3s instance itself —
    # the k3s API (6443) and SSH are firewalled to static home IPs only, so
    # a GitHub-hosted runner has no network path to the cluster. This runner
    # polls GitHub outbound over 443 (already open); no SG changes needed.
    runs-on: [self-hosted, bcc-cvote-prod]

    permissions:
      contents: write

    env:
      # Scoped ServiceAccount kubeconfig (voting-prod namespace only) —
      # deliberately NOT the cluster-admin /etc/rancher/k3s/k3s.yaml.
      KUBECONFIG: /home/ubuntu/.kube/deployer-config

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Update image tags in manifests ───────────────────────────────────
      - name: Update image tags in manifests
        run: |
          ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
          TAG=${{ needs.build-and-push.outputs.image_tag }}
          REGION=${{ env.AWS_REGION }}

          sed -i -E "s|[A-Za-z0-9_]+\.dkr\.ecr\.[a-z0-9-]+\.amazonaws\.com/${{ env.BACKEND_REPO }}:[A-Za-z0-9._-]+|${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/${{ env.BACKEND_REPO }}:${TAG}|g" \
            k8s/prod/backend-deployment.yaml

          sed -i -E "s|[A-Za-z0-9_]+\.dkr\.ecr\.[a-z0-9-]+\.amazonaws\.com/${{ env.FRONTEND_REPO }}:[A-Za-z0-9._-]+|${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/${{ env.FRONTEND_REPO }}:${TAG}|g" \
            k8s/prod/frontend-deployment.yaml

      # ── Apply directly — this replaces ArgoCD's sync role. Deliberately
      #    scoped to just the two Deployment manifests, not the whole
      #    k8s/prod/ directory: a routine image-tag bump has no business
      #    touching the namespace/configmap/ingress/secret/middleware
      #    resources, and the deployer ServiceAccount's Role is scoped to
      #    match (deployments/services/pods only in voting-prod) — those
      #    structural resources are applied deliberately/manually, not as
      #    part of every deploy. The existing maxSurge=1/maxUnavailable=0
      #    strategy on both Deployments already gives a sequential (not
      #    simultaneous) blue-green-style cutover: the new pod must pass
      #    its readiness probe before the old one is ever terminated. ─────
      - name: Apply manifests
        run: kubectl apply -f k8s/prod/backend-deployment.yaml -f k8s/prod/frontend-deployment.yaml

      - name: Wait for rollout
        id: rollout
        run: |
          kubectl rollout status deployment/bcc-backend -n voting-prod --timeout=120s
          kubectl rollout status deployment/bcc-frontend -n voting-prod --timeout=120s

      - name: Smoke test
        id: smoke
        run: |
          for i in $(seq 1 10); do
            CODE=$(curl -sk -o /dev/null -w '%{http_code}' -m 10 "${{ env.CLOUDFRONT_URL }}/" || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "smoke test passed ($CODE)"
              exit 0
            fi
            sleep 5
          done
          echo "smoke test failed after retries"
          exit 1

      # ── Automatic rollback — the safety net ArgoCD's selfHeal used to
      #    provide. Reverts both Deployments to their previous ReplicaSet.
      - name: Rollback on failure
        if: failure()
        run: |
          echo "::error::Rollout or smoke test failed — rolling back to the previous version"
          kubectl rollout undo deployment/bcc-backend -n voting-prod
          kubectl rollout undo deployment/bcc-frontend -n voting-prod
          kubectl rollout status deployment/bcc-backend -n voting-prod --timeout=120s
          kubectl rollout status deployment/bcc-frontend -n voting-prod --timeout=120s
          exit 1

      # ── Commit deployed manifests (audit trail only — kubectl apply above
      #    already performed the actual deploy; this is just history) ──────
      - name: Commit deployed manifests
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/prod/backend-deployment.yaml k8s/prod/frontend-deployment.yaml
          if git diff --cached --quiet; then
            echo "no manifest changes to record"
          else
            git commit -m "chore: deploy ${{ needs.build-and-push.outputs.image_tag }} to prod [skip ci]"
            git push
          fi
